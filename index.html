<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Horizonte Express — Subir Portada</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #1a1d24;
    --accent: #e63946;
    --text: #f4f4f4;
    --text-dim: #9a9ea6;
    --success: #2ecc71;
    --error: #e74c3c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 24px;
  }
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 40px 32px;
    max-width: 440px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    text-align: center;
  }
  h1 {
    font-size: 22px;
    margin: 0 0 6px;
  }
  p.subtitle {
    color: var(--text-dim);
    font-size: 14px;
    margin: 0 0 28px;
  }
  .dropzone {
    border: 2px dashed #383c46;
    border-radius: 12px;
    padding: 32px 16px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .dropzone:hover, .dropzone.dragover {
    border-color: var(--accent);
    background: rgba(230, 57, 70, 0.06);
  }
  .dropzone input { display: none; }
  .dropzone .icon { font-size: 36px; margin-bottom: 8px; }
  .dropzone .label { font-size: 14px; color: var(--text-dim); }
  #preview {
    margin-top: 16px;
    max-width: 100%;
    max-height: 220px;
    border-radius: 8px;
    display: none;
  }
  button#submitBtn {
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button#submitBtn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .status {
    margin-top: 16px;
    font-size: 14px;
    min-height: 20px;
  }
  .status.success { color: var(--success); }
  .status.error { color: var(--error); }
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <h1>📰 El Horizonte Express</h1>
  <p class="subtitle">Sube la portada del día y el proceso arranca solo.</p>

  <label class="dropzone" id="dropzone">
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/jpg">
    <div class="icon">📤</div>
    <div class="label" id="dropLabel">Toca para elegir la imagen<br>o arrástrala aquí</div>
    <img id="preview" alt="Vista previa">
  </label>

  <button id="submitBtn" disabled>Enviar portada</button>
  <div class="status" id="status"></div>
</div>

<script>
  const fileInput = document.getElementById('fileInput');
  const dropzone = document.getElementById('dropzone');
  const dropLabel = document.getElementById('dropLabel');
  const preview = document.getElementById('preview');
  const submitBtn = document.getElementById('submitBtn');
  const status = document.getElementById('status');

  let selectedFile = null;

  function handleFile(file) {
    if (!file) return;
    if (!['image/jpeg', 'image/png', 'image/jpg'].includes(file.type)) {
      status.textContent = 'Solo se aceptan imágenes JPG o PNG.';
      status.className = 'status error';
      return;
    }
    selectedFile = file;
    submitBtn.disabled = false;
    status.textContent = '';
    status.className = 'status';

    const reader = new FileReader();
    reader.onload = e => {
      preview.src = e.target.result;
      preview.style.display = 'block';
      dropLabel.textContent = file.name;
    };
    reader.readAsDataURL(file);
  }

  fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

  dropzone.addEventListener('dragover', e => {
    e.preventDefault();
    dropzone.classList.add('dragover');
  });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    handleFile(e.dataTransfer.files[0]);
  });

  submitBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    submitBtn.disabled = true;
    status.innerHTML = '<span class="spinner"></span>Enviando portada...';
    status.className = 'status';

    try {
      const formData = new FormData();
      formData.append('portada', selectedFile);

      const res = await fetch('/api/enviar-portada', {
        method: 'POST',
        body: formData
      });

      const data = await res.json();

      if (res.ok) {
        status.textContent = '✅ ¡Portada enviada! El proceso ya está en marcha.';
        status.className = 'status success';
        submitBtn.textContent = 'Enviar otra portada';
        selectedFile = null;
        submitBtn.disabled = true;
        preview.style.display = 'none';
        dropLabel.textContent = 'Toca para elegir la imagen o arrástrala aquí';
        fileInput.value = '';
      } else {
        throw new Error(data.error || 'Error desconocido');
      }
    } catch (err) {
      status.textContent = '❌ No se pudo enviar: ' + err.message;
      status.className = 'status error';
      submitBtn.disabled = false;
    }
  });
</script>

</body>
</html>
